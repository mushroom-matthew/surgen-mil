data:
  root: /mnt/data-surgen
  split_seed: 0
  max_patches: 512
  train_frac: 0.7
  val_frac: 0.15
model:
  name: transformer_mil
  input_dim: 1024
  proj_dim: 512
  n_layers: 2
  n_heads: 2
  ffn_dim: 2048
  dropout: 0.15
  ln_eps: 1.0e-05
optimizer:
  lr: 0.0001
  weight_decay: 0.0001
loss:
  name: bce
  weighted: true
training:
  epochs: 50
  seed: 42
  min_epochs: 10
  early_stopping_patience: 10
  selection_metric: val_auprc
  ema_alpha: 0.7
  use_amp: true
  use_best_checkpoint: true
output:
  dir: outputs/paper_reproduction_fair
