data:
  root: /mnt/data-surgen
  max_patches: 512
  train_frac: 0.7
  val_frac: 0.15

model:
  name: lse_pool
  input_dim: 1024
  dropout: 0.1
  tau: 5.0       # tau=5: approaching mean-like behaviour
  learn_tau: true
  alpha: 0.5

loss:
  name: bce
  weighted: true

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

training:
  epochs: 15
  seed: 42
  early_stopping_patience: 3
  selection_metric: val_auprc

output:
  dir: outputs/uni_lse_tau5
