data:
  root: /mnt/data-surgen
  max_patches: 512
  train_frac: 0.7
  val_frac: 0.15

model:
  name: mean_pool
  input_dim: 1024
  hidden_dim: 256
  dropout: 0.1

loss:
  name: focal
  alpha: 0.5
  gamma: 2.0

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

training:
  epochs: 30
  seed: 42
  early_stopping_patience: 10
  selection_metric: val_auprc

output:
  dir: outputs/uni_mean_focal
