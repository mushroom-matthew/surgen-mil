data:
  root: /mnt/data-surgen
  max_patches: 512
  train_frac: 0.7
  val_frac: 0.15

model:
  name: region_attention_mil
  input_dim: 1024
  attention_dim: 128
  hidden_dim: 256
  dropout: 0.1
  n_bins: 16   # 16×16 = 256 possible regions; finer spatial resolution

loss:
  name: bce
  weighted: true

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

training:
  epochs: 30
  seed: 42
  early_stopping_patience: 10
  selection_metric: val_auprc

output:
  dir: outputs/uni_region_attention_16
