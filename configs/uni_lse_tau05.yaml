data:
  root: /mnt/data-surgen
  max_patches: 512
  train_frac: 0.7
  val_frac: 0.15

model:
  name: lse_pool
  input_dim: 1024
  dropout: 0.1
  tau: 2.0       # tau=2: still selective, softer than max
  learn_tau: true
  alpha: 0.5     # blend 50% lse + 50% mean

loss:
  name: bce
  weighted: true

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

training:
  epochs: 30
  seed: 42
  early_stopping_patience: 10
  selection_metric: val_auprc

output:
  dir: outputs/uni_lse_tau2
